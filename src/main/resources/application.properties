spring.application.name=notion-template-api

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/notion_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

api.security.token.secret=${JWT_SECRET:your-secret-key-must-be-at-least-32-chars-long-replace-in-production}
api.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://notion-template-indol.vercel.app}
api.security.token.expiration-hours=${JWT_EXPIRATION_HOURS:2}
